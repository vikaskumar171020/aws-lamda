name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    name: Validate and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        id: type_check
        run: npm run type-check 2>&1 | tee typecheck.log

      - name: Run unit tests and verify coverage
        id: test_coverage
        run: npm run test:coverage 2>&1 | tee test.log

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Run SAM Build
        id: sam_build
        run: sam build 2>&1 | tee sambuild.log

      - name: Generate Validation Report
        if: always()
        run: |
          echo "### 🚀 Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check Type-check
          if [ "${{ steps.type_check.outcome }}" = "success" ]; then
            echo "- **TypeScript Check**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.type_check.outcome }}" = "failure" ]; then
            echo "- **TypeScript Check**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            if [ -f typecheck.log ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>🔍 View Type-check Error Logs</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
              cat typecheck.log >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **TypeScript Check**: ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Test & Coverage
          if [ "${{ steps.test_coverage.outcome }}" = "success" ]; then
            echo "- **Unit Tests & Coverage**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test_coverage.outcome }}" = "failure" ]; then
            echo "- **Unit Tests & Coverage**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            if [ -f test.log ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>🔍 View Test & Coverage Error Logs</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
              cat test.log >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **Unit Tests & Coverage**: ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          # Check SAM Build
          if [ "${{ steps.sam_build.outcome }}" = "success" ]; then
            echo "- **AWS SAM Build**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.sam_build.outcome }}" = "failure" ]; then
            echo "- **AWS SAM Build**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            if [ -f sambuild.log ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>🔍 View SAM Build Error Logs</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
              cat sambuild.log >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **AWS SAM Build**: ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create or Update PR Comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let summary = '### 🚀 Validation Report\n\n';

            // Check Type-check
            const typeCheckOutcome = '${{ steps.type_check.outcome }}';
            if (typeCheckOutcome === 'success') {
              summary += '- **TypeScript Check**: ✅ Success\n';
            } else if (typeCheckOutcome === 'failure') {
              summary += '- **TypeScript Check**: ❌ Failed\n';
              if (fs.existsSync('typecheck.log')) {
                const logs = fs.readFileSync('typecheck.log', 'utf8');
                summary += '\n<details><summary>🔍 View Type-check Error Logs</summary>\n\n```bash\n' + logs + '\n```\n</details>\n\n';
              }
            } else {
              summary += '- **TypeScript Check**: ⚠️ Skipped\n';
            }

            // Check Test & Coverage
            const testCoverageOutcome = '${{ steps.test_coverage.outcome }}';
            if (testCoverageOutcome === 'success') {
              summary += '- **Unit Tests & Coverage**: ✅ Success\n';
            } else if (testCoverageOutcome === 'failure') {
              summary += '- **Unit Tests & Coverage**: ❌ Failed\n';
              if (fs.existsSync('test.log')) {
                const logs = fs.readFileSync('test.log', 'utf8');
                summary += '\n<details><summary>🔍 View Test & Coverage Error Logs</summary>\n\n```bash\n' + logs + '\n```\n</details>\n\n';
              }
            } else {
              summary += '- **Unit Tests & Coverage**: ⚠️ Skipped\n';
            }

            // Check SAM Build
            const samBuildOutcome = '${{ steps.sam_build.outcome }}';
            if (samBuildOutcome === 'success') {
              summary += '- **AWS SAM Build**: ✅ Success\n';
            } else if (samBuildOutcome === 'failure') {
              summary += '- **AWS SAM Build**: ❌ Failed\n';
              if (fs.existsSync('sambuild.log')) {
                const logs = fs.readFileSync('sambuild.log', 'utf8');
                summary += '\n<details><summary>🔍 View SAM Build Error Logs</summary>\n\n```bash\n' + logs + '\n```\n</details>\n\n';
              }
            } else {
              summary += '- **AWS SAM Build**: ⚠️ Skipped\n';
            }

            // Find existing validation report comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => comment.body.includes('🚀 Validation Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }

  deploy:
    name: Deploy to AWS Lambda
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: SAM Build
        run: sam build

      - name: Archive build artifacts to (.zip)
        run: |
          zip -r deploy-package.zip .aws-sam/ template.yaml package.json

      - name: Upload Deployment Package to Job Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sam-deploy-package
          path: deploy-package.zip
          retention-days: 7

      - name: SAM Deploy
        run: |
          # AWS CloudFormation natively implements transactional rollback.
          # If the deployment fails (e.g. Lambda creation error, template violation), 
          # AWS will automatically roll back the entire stack to the last successful deployment state.
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
