name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of version bump (Major, Minor, Patch)'
        required: true
        default: 'Patch'
        type: choice
        options:
          - Patch
          - Minor
          - Major

permissions:
  id-token: write
  pull-requests: write
  contents: write

jobs:
  validate:
    name: Validate and Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Add node_modules/.bin to PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Run TypeScript type-check
        id: type_check
        run: npm run type-check 2>&1 | tee typecheck.log

      - name: Run unit tests and verify coverage
        id: test_coverage
        run: npm run test:coverage 2>&1 | tee test.log

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Run SAM Build
        id: sam_build
        run: sam build 2>&1 | tee sambuild.log

      - name: Generate Validation Report
        if: always()
        run: |
          echo "### 🚀 Validation Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check Type-check
          if [ "${{ steps.type_check.outcome }}" = "success" ]; then
            echo "- **TypeScript Check**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.type_check.outcome }}" = "failure" ]; then
            echo "- **TypeScript Check**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            if [ -f typecheck.log ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>🔍 View Type-check Error Logs</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
              cat typecheck.log >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **TypeScript Check**: ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          # Check Test & Coverage
          if [ "${{ steps.test_coverage.outcome }}" = "success" ]; then
            echo "- **Unit Tests & Coverage**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.test_coverage.outcome }}" = "failure" ]; then
            echo "- **Unit Tests & Coverage**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            if [ -f test.log ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>🔍 View Test & Coverage Error Logs</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
              cat test.log >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **Unit Tests & Coverage**: ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi

          # Check SAM Build
          if [ "${{ steps.sam_build.outcome }}" = "success" ]; then
            echo "- **AWS SAM Build**: ✅ Success" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.sam_build.outcome }}" = "failure" ]; then
            echo "- **AWS SAM Build**: ❌ Failed" >> $GITHUB_STEP_SUMMARY
            if [ -f sambuild.log ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "<details><summary>🔍 View SAM Build Error Logs</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
              cat sambuild.log >> $GITHUB_STEP_SUMMARY
              echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "- **AWS SAM Build**: ⚠️ Skipped" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create or Update PR Comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let summary = '### 🚀 Validation Report\n\n';

            // Check Type-check
            const typeCheckOutcome = '${{ steps.type_check.outcome }}';
            if (typeCheckOutcome === 'success') {
              summary += '- **TypeScript Check**: ✅ Success\n';
            } else if (typeCheckOutcome === 'failure') {
              summary += '- **TypeScript Check**: ❌ Failed\n';
              if (fs.existsSync('typecheck.log')) {
                const logs = fs.readFileSync('typecheck.log', 'utf8');
                summary += '\n<details><summary>🔍 View Type-check Error Logs</summary>\n\n```bash\n' + logs + '\n```\n</details>\n\n';
              }
            } else {
              summary += '- **TypeScript Check**: ⚠️ Skipped\n';
            }

            // Check Test & Coverage
            const testCoverageOutcome = '${{ steps.test_coverage.outcome }}';
            if (testCoverageOutcome === 'success') {
              summary += '- **Unit Tests & Coverage**: ✅ Success\n';
            } else if (testCoverageOutcome === 'failure') {
              summary += '- **Unit Tests & Coverage**: ❌ Failed\n';
              if (fs.existsSync('test.log')) {
                const logs = fs.readFileSync('test.log', 'utf8');
                summary += '\n<details><summary>🔍 View Test & Coverage Error Logs</summary>\n\n```bash\n' + logs + '\n```\n</details>\n\n';
              }
            } else {
              summary += '- **Unit Tests & Coverage**: ⚠️ Skipped\n';
            }

            // Check SAM Build
            const samBuildOutcome = '${{ steps.sam_build.outcome }}';
            if (samBuildOutcome === 'success') {
              summary += '- **AWS SAM Build**: ✅ Success\n';
            } else if (samBuildOutcome === 'failure') {
              summary += '- **AWS SAM Build**: ❌ Failed\n';
              if (fs.existsSync('sambuild.log')) {
                const logs = fs.readFileSync('sambuild.log', 'utf8');
                summary += '\n<details><summary>🔍 View SAM Build Error Logs</summary>\n\n```bash\n' + logs + '\n```\n</details>\n\n';
              }
            } else {
              summary += '- **AWS SAM Build**: ⚠️ Skipped\n';
            }

            // Find existing validation report comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(comment => comment.body.includes('🚀 Validation Report'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }

  deploy:
    name: Deploy to AWS Lambda
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Calculate Next Version
        id: versioning
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const currentVersion = pkg.version;
            const releaseType = '${{ inputs.release_type }}'.toLowerCase();
            
            let [major, minor, patch] = currentVersion.split('.').map(Number);
            
            if (releaseType === 'major') {
              major += 1;
              minor = 0;
              patch = 0;
            } else if (releaseType === 'minor') {
              minor += 1;
              patch = 0;
            } else if (releaseType === 'patch') {
              patch += 1;
            }
            
            const nextVersion = `${major}.${minor}.${patch}`;
            core.setOutput('version', nextVersion);
            
            // Stamp the incremented version in package.json for building/zipping
            pkg.version = nextVersion;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2), 'utf8');
            console.log(`Current version: ${currentVersion} -> Bumped to: ${nextVersion}`);

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Add node_modules/.bin to PATH
        run: echo "${{ github.workspace }}/node_modules/.bin" >> $GITHUB_PATH

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1 # Change to your region (or use ${{ secrets.AWS_REGION }})
          audience: sts.amazonaws.com

      - name: SAM Build
        run: sam build

      - name: Archive build artifacts to (.zip)
        run: |
          zip -r aws-v${{ steps.versioning.outputs.version }}.zip .aws-sam/ template.yaml package.json

      - name: Upload Deployment Package to Job Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aws-v${{ steps.versioning.outputs.version }}
          path: aws-v${{ steps.versioning.outputs.version }}.zip
          retention-days: 7

      - name: SAM Deploy
        run: |
          # 1. Check if stack exists and has a physical API Gateway ID associated
          API_ID=$(aws cloudformation describe-stack-resource --stack-name aws-lambda-express-api --logical-resource-id ServerlessRestApi --query "StackResourceDetail.PhysicalResourceId" --output text --region us-east-1 2>/dev/null || echo "")
          
          if [ -n "$API_ID" ] && [ "$API_ID" != "None" ]; then
            echo "Checking status of API Gateway $API_ID..."
            # 2. Check if API Gateway exists on AWS. If not (returns error), delete the drifted stack to rebuild it
            if ! aws apigateway get-rest-api --rest-api-id "$API_ID" --region us-east-1 >/dev/null 2>&1; then
              echo "⚠️ WARNING: API Gateway $API_ID was manually deleted (drifted state)."
              echo "Deleting the drifted CloudFormation stack to trigger clean recreation..."
              aws cloudformation delete-stack --stack-name aws-lambda-express-api --region us-east-1
              echo "Waiting for stack deletion to complete..."
              aws cloudformation wait stack-delete-complete --stack-name aws-lambda-express-api --region us-east-1
              echo "Stack deleted. Recreating infrastructure..."
            else
              echo "API Gateway $API_ID is active and healthy."
            fi
          fi

          # 3. Proceed with standard SAM deploy
          # AWS CloudFormation natively implements transactional rollback.
          # If the deployment fails (e.g. Lambda creation error, template violation), 
          # AWS will automatically roll back the entire stack to the last successful deployment state.
          sam deploy --stack-name aws-lambda-express-api --resolve-s3 --capabilities CAPABILITY_IAM --no-confirm-changeset --no-fail-on-empty-changeset

          # 4. Clean up the S3 deployment bucket to save storage costs
          S3_BUCKET=$(aws cloudformation describe-stacks --stack-name aws-sam-cli-managed-default --query "Stacks[0].Outputs[?OutputKey=='SourceBucket'].OutputValue" --output text --region us-east-1 2>/dev/null || echo "")
          if [ -n "$S3_BUCKET" ] && [ "$S3_BUCKET" != "None" ]; then
            echo "Cleaning up S3 deployment bucket s3://$S3_BUCKET..."
            aws s3 rm "s3://$S3_BUCKET" --recursive --region us-east-1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: aws-v${{ steps.versioning.outputs.version }}.zip
          tag_name: aws-v${{ steps.versioning.outputs.version }}
          name: Release aws-v${{ steps.versioning.outputs.version }}
          body: |
            AWS Lambda deployment package successfully created and deployed.
            
            **Version**: `aws-v${{ steps.versioning.outputs.version }}`
            **Stack**: `aws-lambda-express-api`
            **Region**: `us-east-1`
            **Git Commit**: ${{ github.sha }}
